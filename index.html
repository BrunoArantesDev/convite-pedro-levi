<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite Pedro Levi - 1 Ano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1b2a;
            /* Fundo escuro elegante para destacar o tema príncipe */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1s ease, transform 1.2s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        #screen1 {
            background-image: url('img/foto1.png');
        }

        #screen2 {
            background-image: url('img/foto2.png');
            background-color: #ffffff;
            /* Fundo branco caso a imagem 2 seja menor */
        }

        /* Área interativa (Sempre coincidente com a imagem 'contain') */
        .interaction-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Fórmula mágica para manter 9:16 dentro da tela sem sobrar */
            width: min(100vw, calc(100vh * 9 / 16));
            height: min(100vh, calc(100vw * 16 / 9));
            pointer-events: none; /* Permite interagir com o que está dentro */
            display: flex;
            flex-direction: column;
        }

        .interaction-wrapper * {
            pointer-events: auto; /* Reativa cliques nos botões e inputs */
        }

        /* Estrelas Brilhantes */
        .stars-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .star {
            position: absolute;
            background: #FFD700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle var(--duration) infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes twinkle {

            0%,
            100% {
                transform: scale(0.6);
                opacity: 0.2;
                filter: drop-shadow(0 0 2px rgba(255, 215, 0, 0.3));
            }

            50% {
                transform: scale(1.0);
                opacity: 0.7;
                filter: drop-shadow(0 0 12px rgba(255, 223, 0, 0.9));
            }
        }

        /* Botões Invisíveis */
        .btn-overlay {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 30;
        }

        /* Botões Invisíveis Tela 1 */
        .btn-location {
            bottom: 3%;
            left: 3%;
            width: 32%;
            height: 15%;
        }

        .btn-rsvp {
            bottom: 3%;
            left: 35%; /* Movi mais para perto da localização */
            width: 45%; /* Área maior para garantir o clique */
            height: 15%;
        }

        /* Estilização dos Campos do Formulário (Transparentes sobre a arte) */
        .input-group-name {
            position: absolute;
            top: 38.5%;
            /* Subido em 8% conforme solicitado */
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            z-index: 100;
        }

        .input-group-qty {
            position: absolute;
            top: 47.5%;
            /* Subido em 3% conforme solicitado */
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            z-index: 100;
        }

        .styled-input {
            width: 100%;
            padding: 12px;
            background: transparent;
            /* Usa o fundo da imagem */
            border: none;
            /* Sem bordas duplicadas */
            outline: none;
            font-size: 16px;
            color: #333;
            text-align: center;
            font-family: inherit;
        }

        .btn-invisible-confirm {
            position: absolute;
            bottom: 35%;
            /* Abaixado 10% conforme solicitado */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 12%;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 100;
        }

        /* Botão Voltar */
        .btn-back {
            position: absolute;
            top: 3%;
            left: 5%;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.6);
            border: none;
            border-radius: 50%;
            color: #457b9d;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 110;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, background 0.2s;
        }

        .btn-back:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.9);
        }

    </style>
</head>

<body>

    <div class="container">
        <!-- TELA 1 -->
        <div id="screen1" class="screen active">
            <div class="interaction-wrapper">
                <div class="stars-overlay" id="stars1"></div>

                <!-- Botão LOCALIZAÇÃO (Google Maps) -->
                <a href="https://maps.app.goo.gl/vjTCtpc5hLCrn3Bn9?g_st=iw" target="_blank"
                    class="btn-overlay btn-location" title="Ver Localização"></a>

                <!-- Botão CONFIRME SUA PRESENÇA (Troca de tela) -->
                <button class="btn-overlay btn-rsvp" id="triggerRsvp" title="Confirmar Presença"></button>
            </div>
        </div>

        <!-- TELA 2 -->
        <div id="screen2" class="screen">
            <div class="interaction-wrapper">
                <div class="stars-overlay" id="stars2"></div>

                <!-- Botão Voltar -->
                <button class="btn-back" id="goBack" title="Voltar para o convite">←</button>

                <!-- Formulário Interativo sobre a Foto 2 -->
                <div class="input-group-name">
                    <input type="text" id="guestName" placeholder="Digite seu nome..." class="styled-input">
                </div>

                <div class="input-group-qty">
                    <select id="guestQty" class="styled-input">
                        <option value="" disabled selected>Quantidade de convidados...</option>
                        <option value="1">1 Pessoa</option>
                        <option value="2">2 Pessoas</option>
                        <option value="3">3 Pessoas</option>
                        <option value="4">4 Pessoas</option>
                        <option value="5">5 Pessoas</option>
                    </select>
                </div>

                <!-- Botão de Confirmação Invisível sobre o botão da imagem -->
                <button id="btnConfirmWhatsApp" class="btn-invisible-confirm"></button>
            </div>
        </div>
    </div>

    <script>
        const s1 = document.getElementById('screen1');
        const s2 = document.getElementById('screen2');
        const btn = document.getElementById('triggerRsvp');
        const btnWhatsapp = document.getElementById('btnConfirmWhatsApp');
        const guestNameInput = document.getElementById('guestName');

        const btnBack = document.getElementById('goBack');

        // Transição de tela 1 para tela 2
        btn.addEventListener('click', () => {
            s1.style.opacity = '0';
            s1.style.transform = 'scale(0.95)';

            setTimeout(() => {
                s1.classList.remove('active');
                s2.classList.add('active');
                s2.style.opacity = '1';
                s2.style.transform = 'scale(1)';
            }, 600);
        });

        // Transição de tela 2 para tela 1 (Voltar)
        btnBack.addEventListener('click', () => {
            s2.style.opacity = '0';
            s2.style.transform = 'scale(0.95)';

            setTimeout(() => {
                s2.classList.remove('active');
                s1.classList.add('active');
                s1.style.opacity = '1';
                s1.style.transform = 'scale(1)';
            }, 600);
        });

        // Lógica do WhatsApp
        btnWhatsapp.addEventListener('click', () => {
            const name = guestNameInput.value.trim();
            const qty = document.getElementById('guestQty').value;

            if (name === "") {
                alert("Por favor, digite seu nome.");
                return;
            }
            if (qty === "") {
                alert("Por favor, selecione a quantidade de convidados.");
                return;
            }

            const message = `Olá!\n\nCom muita alegria, confirmamos nossa presença no aniversário do Pequeno Pedro Levi!\n\nEstamos felizes em participar desse momento tão especial e celebrar esse primeiro aninho cheio de amor, encanto e alegria.\n\nNome: ${name}\nConvidados: ${qty}\n\nAté a festa!`;
            const encodedMessage = encodeURIComponent(message);
            
            // Link direto para o número do anfitrião
            const phone = "558198975368";
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${phone}&text=${encodedMessage}`;
            
            window.location.href = whatsappUrl;
        });

        // Gerar estrelas dinamicamente
        function addStars(containerId) {
            const container = document.getElementById(containerId);
            const count = 18; // Um pouco mais de estrelas para preencher a arte

            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                // Posições aleatórias focadas na arte (evitando o rodapé dos botões)
                const top = Math.random() * 75 + '%';
                const left = Math.random() * 90 + 5 + '%';
                const size = Math.random() * 8 + 5 + 'px'; // Estrelas pequenas e delicadas
                const duration = Math.random() * 4 + 4 + 's'; // Animação lenta (4 a 8 segundos)
                const delay = Math.random() * 10 + 's'; // Delay longo para não pulsarem juntas

                star.style.top = top;
                star.style.left = left;
                star.style.width = size;
                star.style.height = size;
                star.style.setProperty('--duration', duration);
                star.style.animationDelay = delay;

                container.appendChild(star);
            }
        }

        window.onload = () => {
            addStars('stars1');
            addStars('stars2');
        };
    </script>
</body>

</html>
